services:
  navidrome:
    image: deluan/navidrome:latest
    ports:
      - '4533:4533'
    volumes:
      - ./test-music:/music:ro
      - navidrome-data:/data
    environment:
      ND_MUSICFOLDER: /music
      ND_DATAFOLDER: /data
      ND_SCANSCHEDULE: '@startup'
      ND_LOGLEVEL: info
      ND_ENABLETRANSCODINGCONFIG: 'true'
      ND_LASTFM_ENABLED: 'false'
      ND_SPOTIFY_ID: ''
      ND_SPOTIFY_SECRET: ''
      ND_ENABLEINSIGHTSCOLLECTOR: 'false'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4533/ping']
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  navidrome-https:
    image: nginx:alpine
    ports:
      - '4534:443'
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx-tls.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      navidrome:
        condition: service_healthy
    healthcheck:
      # nginx:alpine only ships BusyBox's wget, not curl (matching the existing
      # navidrome healthcheck below) — --no-check-certificate is wget's
      # equivalent of curl -k, needed since this is proxying to itself over the
      # self-signed cert this whole stack exists to test.
      test: ['CMD', 'wget', '--no-check-certificate', '-qO-', 'https://localhost/ping']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  jellyfin:
    image: jellyfin/jellyfin:latest
    ports:
      - '8096:8096'
    volumes:
      - ./test-music:/media/music:ro
      - jellyfin-config:/config
      - jellyfin-cache:/cache
    environment:
      JELLYFIN_PublishedServerUrl: http://localhost:8096
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8096/health']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  navidrome-data:
  jellyfin-config:
  jellyfin-cache:
