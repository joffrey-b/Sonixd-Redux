stages:
  - test
  - build

test:
  stage: test
  tags:
    - windows
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  cache:
    key:
      files:
        - yarn.lock
    paths:
      - node_modules/
  variables:
    ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
  script:
    - yarn install --frozen-lockfile --network-timeout 300000 --network-concurrency 1
    - node node_modules/electron/install.js
    - yarn lint
    - yarn tsc-silent -p ./tsconfig.json --suppress 2702@/node_modules/react-chartjs-2/ 9006@/src/main.dev.js
    - yarn test

build-windows:
  stage: build
  tags:
    - windows
  rules:
    - if: $CI_COMMIT_TAG
  cache:
    key:
      files:
        - yarn.lock
    paths:
      - node_modules/
  script:
    - yarn install --frozen-lockfile --network-timeout 300000 --network-concurrency 1
    - yarn postinstall
    - yarn build
    - yarn electron-builder --publish never --win
  artifacts:
    name: sonixd-redux-$CI_COMMIT_TAG-windows
    paths:
      - release/
    expire_in: 2 weeks
