stages:
  - test
  - build

default:
  tags:
    - windows
  cache:
    key:
      files:
        - yarn.lock
    paths:
      - node_modules/

# -------------------------
# TEST JOB (runs always)
# -------------------------
test:
  stage: test
  rules:
    - when: always
  script:
    - yarn install --frozen-lockfile --network-timeout 300000 --network-concurrency 1
    - yarn lint
    - yarn build:main
    - yarn build:renderer
    - yarn tsc-silent -p ./tsconfig.json --suppress 2702@/node_modules/react-chartjs-2/ 9006@/src/main.dev.js
    - yarn test

# -------------------------
# BUILD JOB (only on tags)
# -------------------------
build-windows:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
  variables:
    ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
  script:
    - yarn install --frozen-lockfile --network-timeout 300000 --network-concurrency 1
    - node node_modules/electron/install.js
    - yarn postinstall
    - yarn build
    - yarn electron-builder --publish never --win
  artifacts:
    name: sonixd-redux-$CI_COMMIT_TAG-windows
    paths:
      - release/*.exe
    expire_in: 2 weeks
